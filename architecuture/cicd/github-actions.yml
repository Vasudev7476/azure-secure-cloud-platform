name: Azure Deployment

on: 
   push:
      branches:
          - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy: 
    runs-on: ubuntu-latest

    steps: 
       - name: Checkout
         uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
         with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.Azure_TENANT_ID }}
            subscription-id: ${{  secrets.AZURE_SUBSCRIPTION_ID }}
            
          
